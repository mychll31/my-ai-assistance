name: telegram-calendar-bot
region: sgp  # Singapore — closest to PH

services:
- name: bot
  dockerfile_path: Dockerfile
  http_port: 8080
  instance_size_slug: basic-xxs   # $5/month, 512MB RAM, always-on
  instance_count: 1
  health_check:
    http_path: /health
  envs:
  - key: PORT
    value: "8080"
  - key: TIMEZONE
    value: "Asia/Manila"
  - key: TELEGRAM_BOT_TOKEN
    type: SECRET
  - key: GOOGLE_CLIENT_ID
    type: SECRET
  - key: GOOGLE_CLIENT_SECRET
    type: SECRET
  - key: ANTHROPIC_API_KEY
    type: SECRET
  - key: OAUTH_REDIRECT_URI
    type: SECRET
  - key: AUTHORIZED_USER_ID
    type: SECRET
  - key: GOOGLE_REFRESH_TOKEN
    type: SECRET
