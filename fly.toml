app = "telegram-calendar-bot"
primary_region = "sin"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    path = "/health"
    interval = "30s"
    timeout = "5s"

[[mounts]]
  source = "calendar_data"
  destination = "/data"

[env]
  PORT = "8080"
  TIMEZONE = "UTC"
